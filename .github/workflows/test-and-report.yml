# Manual test run + Allure Report 3 publishing.
# Pin actions to reviewed major versions or immutable commit SHAs per repository policy.
name: test-and-report

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner image
        type: choice
        options: [ubuntu-24.04, windows-2025]
        default: ubuntu-24.04
      browser:
        description: Browser
        type: choice
        options: [chromium, firefox, webkit, all]
        default: chromium
      type:
        description: Test type
        type: choice
        options: [ui, api, database, e2e, all]
        default: all
      suite:
        description: Suite
        type: choice
        options: [smoke, regression, all]
        default: smoke
      tags:
        description: Comma-separated category tags (validated)
        type: string
        default: ""
      parallelism:
        description: Worker count
        type: choice
        options: ["1", "2", "4", "8"]
        default: "4"

  # Enable only after choosing and documenting the schedule and timezone.
  # GitHub cron is UTC and does not accept an IANA timezone. The test job resolves each input with
  # a default (below), so uncommenting this schedule produces a working Chromium + Smoke run on
  # Ubuntu with no further changes — the same validated command path as manual runs.
  # schedule:
  #   - cron: "0 18 * * 1-5" # EXAMPLE ONLY; UTC

permissions:
  contents: read

# Serialize runs repository-wide so Pages deployment and the single durable history branch never
# race. A constant group (not one keyed on github.ref) is deliberate: every run force-pushes the
# same allure-history branch, so two dispatches from different branches must not update it
# concurrently. cancel-in-progress stays false so an in-flight run finishes rather than being killed.
concurrency:
  group: test-and-report-allure-history
  cancel-in-progress: false

jobs:
  test:
    # Fall back to defaults so the workflow also runs on the (disabled) schedule event, where the
    # workflow_dispatch inputs do not exist. A scheduled run uses Chromium + Smoke on Ubuntu.
    runs-on: ${{ inputs.runner || 'ubuntu-24.04' }}
    environment: Test
    env:
      RUN_RUNNER: ${{ inputs.runner || 'ubuntu-24.04' }}
      RUN_BROWSER: ${{ inputs.browser || 'chromium' }}
      RUN_TYPE: ${{ inputs.type || 'all' }}
      RUN_SUITE: ${{ inputs.suite || 'smoke' }}
      RUN_PARALLELISM: ${{ inputs.parallelism || '4' }}
    outputs:
      failed: ${{ steps.run.outputs.failed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore (locked mode)
        run: dotnet restore AutomationTemplate.slnx --locked-mode

      - name: Build Release
        run: dotnet build AutomationTemplate.slnx -c Release --no-restore

      - name: Install Playwright browsers (only when the type needs them)
        if: ${{ env.RUN_TYPE == 'ui' || env.RUN_TYPE == 'e2e' || env.RUN_TYPE == 'all' }}
        shell: pwsh
        run: |
          if ($env:RUN_RUNNER -like 'ubuntu*') {
            pwsh ./scripts/Install-Playwright.ps1 -Browser $env:RUN_BROWSER -WithDeps
          } else {
            pwsh ./scripts/Install-Playwright.ps1 -Browser $env:RUN_BROWSER
          }

      - name: Run tests (exit status is authoritative)
        id: run
        shell: pwsh
        env:
          AUTOMATION__Api__BearerToken: ${{ secrets.API_BEARER_TOKEN }}
          AUTOMATION__SqlServer__ConnectionString: ${{ secrets.SQL_CONNECTION_STRING }}
          # Fall back to the validated placeholders when the Test variables are not configured,
          # so options validation passes in an unconfigured template. Real values (once set as
          # repository/environment variables) take precedence.
          AUTOMATION__Browser__BaseUrl: ${{ vars.WEB_BASE_URL || 'https://test.example.invalid' }}
          AUTOMATION__Api__BaseUrl: ${{ vars.API_BASE_URL || 'https://api.test.example.invalid' }}
          # Free-text input is passed as data via the environment, never interpolated into the
          # PowerShell source below (the script allowlist then validates it as defense in depth).
          INPUT_TAGS: ${{ inputs.tags }}
        run: |
          $type = switch ($env:RUN_TYPE) { 'ui' { 'UI' } 'api' { 'API' } 'database' { 'Database' } 'e2e' { 'E2E' } default { 'All' } }
          $suite = switch ($env:RUN_SUITE) { 'regression' { 'Regression' } 'all' { 'All' } default { 'Smoke' } }
          pwsh ./scripts/Invoke-Tests.ps1 -Type $type -Suite $suite -Browser $env:RUN_BROWSER -Workers $env:RUN_PARALLELISM -Tags $env:INPUT_TAGS
          $code = $LASTEXITCODE
          if ($code -ne 0) { "failed=true" >> $env:GITHUB_OUTPUT } else { "failed=false" >> $env:GITHUB_OUTPUT }
          # Fail the job honestly on test failure. The always() upload steps below still run, and
          # the report/deploy jobs run via needs+always(), so reporting is preserved.
          exit $code

      - name: Upload raw diagnostics (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ github.run_id }}
          path: |
            artifacts/**
            allure-results/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Allure results for reporting (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/**
          if-no-files-found: warn
          retention-days: 3

  report:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push durable history to the history branch
    outputs:
      have_results: ${{ steps.guard.outputs.have_results }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results
        continue-on-error: true

      - name: Detect results
        id: guard
        shell: bash
        run: |
          if [ -d allure-results ] && [ -n "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "have_results=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_results=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if results were expected but missing
        # If the tests succeeded, they must have produced Allure results. Missing results then mean
        # an empty selection or lost artifact — surface it as a failure rather than a silent no-op.
        if: ${{ needs.test.result == 'success' && steps.guard.outputs.have_results != 'true' }}
        run: |
          echo "Tests succeeded but produced no Allure results (empty selection or lost artifact)."
          exit 1

      - name: Restore durable history
        if: ${{ steps.guard.outputs.have_results == 'true' }}
        shell: bash
        run: |
          mkdir -p allure-history
          if git ls-remote --exit-code --heads origin allure-history >/dev/null 2>&1; then
            git fetch origin allure-history
            git show origin/allure-history:history.jsonl > allure-history/history.jsonl 2>/dev/null || true
          fi

      - name: Set up Node (from .nvmrc)
        if: ${{ steps.guard.outputs.have_results == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Generate Allure Report 3
        if: ${{ steps.guard.outputs.have_results == 'true' }}
        run: |
          npm ci
          # Remove any pre-existing report so no stale root index.html survives generation. Hosted
          # runners start clean; this keeps self-hosted runners correct too.
          rm -rf allure-report
          npx allure generate allure-results

      - name: Persist durable history
        if: ${{ steps.guard.outputs.have_results == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ ! -f allure-history/history.jsonl ]; then
            echo "No history.jsonl produced; nothing to persist."
            exit 0
          fi
          # Do the branch work in a clean throwaway repo so the branch name never collides with the
          # allure-history/ working directory, and no untracked report/node_modules interfere. The
          # branch is a single-file durable store we fully own, so a force-push is correct and safe
          # (the workflow concurrency group prevents races).
          work="$(mktemp -d)"
          cp allure-history/history.jsonl "$work/history.jsonl"
          cd "$work"
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b allure-history
          git add history.jsonl
          git commit -q -m "Update Allure history (run ${{ github.run_id }})"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" allure-history

      - name: Upload Pages artifact
        if: ${{ steps.guard.outputs.have_results == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: report
    # Only deploy when a report was actually produced; a real Pages deployment failure then fails
    # this job (no continue-on-error) so a broken publish is visible rather than silently tolerated.
    if: ${{ always() && needs.report.outputs.have_results == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  verdict:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Reflect the original test result
        shell: bash
        run: |
          # Evaluate both the job result and the test output. If the test job failed before the run
          # step executed (checkout, restore, build, or Playwright install), `failed` is empty — the
          # job result then catches it, so the verdict never prints a misleading "Tests passed."
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.test.outputs.failed }}" = "true" ]; then
            echo "The test job did not complete successfully; reporting ran but the run is marked failed."
            exit 1
          fi
          echo "Tests passed."

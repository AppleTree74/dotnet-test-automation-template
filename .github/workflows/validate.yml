# Fast structural validation. Uses no Test secrets and installs no browsers.
# Pin actions to reviewed major versions or immutable commit SHAs per repository policy.
name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore (locked mode)
        run: dotnet restore AutomationTemplate.slnx --locked-mode

      - name: Build Release (warnings as errors)
        run: dotnet build AutomationTemplate.slnx -c Release --no-restore

      - name: Verify formatting
        run: dotnet format AutomationTemplate.slnx --verify-no-changes --no-restore

      - name: Framework unit and structural tests
        run: dotnet test tests/Automation.UnitTests/Automation.UnitTests.csproj -c Release --no-build

      - name: Discover NUnit tests
        run: dotnet test tests/Application.Tests/Application.Tests.csproj -c Release --no-build --list-tests

      - name: Verify authoritative exit-status contract
        shell: pwsh
        run: pwsh ./scripts/Test-ExitContract.ps1

      - name: Set up Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Restore npm (locked) and validate the Allure CLI
        # validate.yml owns locked .NET and npm dependency restoration (guide section 13). npm ci
        # fails on a package-lock.json mismatch or an unavailable pinned version; the CLI probe
        # proves the pinned Allure 3 command surface is usable without secrets or a browser.
        run: |
          npm ci
          npx allure --version

      - name: Validate template tokens and categories
        shell: pwsh
        run: pwsh ./scripts/Validate-Template.ps1

  template-generation:
    # Generates a repository from the template and validates it end to end (restore, build, format,
    # unit tests, generated-repository validation). Guards template-generation regressions (P1-01).
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Generate a repository from the template and validate it
        shell: pwsh
        run: pwsh ./scripts/Test-TemplateGeneration.ps1
